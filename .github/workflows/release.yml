name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # release asset upload için

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install pyinstaller pillow

      - name: Generate icon
        run: python scripts/create_icon.py

      - name: Build Pentra.exe
        run: python scripts/build_exe.py

      - name: Verify artefact exists
        run: |
          if (-not (Test-Path "dist/Pentra.exe")) { exit 1 }
          $size = (Get-Item "dist/Pentra.exe").Length / 1MB
          Write-Host "Built Pentra.exe — $([math]::Round($size, 1)) MB"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Pentra.exe
          generate_release_notes: true
          # v*-beta etc. → pre-release olarak işaretle
          prerelease: ${{ contains(github.ref, '-') }}
